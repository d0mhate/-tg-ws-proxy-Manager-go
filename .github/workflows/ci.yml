name: ci

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: 0

    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: setup go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: "1.22"
          cache: false

      - name: test
        run: go test ./...

  build-local:
    needs: test
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: 0

    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: setup go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: "1.22"
          cache: false

      - name: build local binary
        run: go build ./cmd/tg-ws-proxy

  build-binaries:
    needs: test
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: 0
    strategy:
      fail-fast: false
      matrix:
        include:
          - asset: tg-ws-proxy-openwrt-mipsel_24kc
            goos: linux
            goarch: mipsle
            gomips: softfloat
            file_match: "MIPS"
          - asset: tg-ws-proxy-openwrt-mips_24kc
            goos: linux
            goarch: mips
            gomips: softfloat
            file_match: "MIPS"
          - asset: tg-ws-proxy-openwrt-x86_64
            goos: linux
            goarch: amd64
            file_match: "x86-64"
          - asset: tg-ws-proxy-openwrt-armv7
            goos: linux
            goarch: arm
            goarm: "7"
            file_match: "ARM"
          - asset: tg-ws-proxy-openwrt-aarch64
            goos: linux
            goarch: arm64
            file_match: "aarch64"
          - asset: tg-ws-proxy-linux-386
            goos: linux
            goarch: "386"
            file_match: "Intel 80386"
          - asset: tg-ws-proxy-linux-riscv64
            goos: linux
            goarch: riscv64
            file_match: "RISC-V"
          - asset: tg-ws-proxy-linux-armv6
            goos: linux
            goarch: arm
            goarm: "6"
            file_match: "ARM"
          - asset: tg-ws-proxy-linux-loong64
            goos: linux
            goarch: loong64
            file_match: "LoongArch"
          - asset: tg-ws-proxy-windows-amd64.exe
            goos: windows
            goarch: amd64
            file_match: "PE32"
            elf_check: false
          - asset: tg-ws-proxy-windows-arm64.exe
            goos: windows
            goarch: arm64
            file_match: "PE32"
            elf_check: false
          - asset: tg-ws-proxy-darwin-amd64
            goos: darwin
            goarch: amd64
            file_match: "Mach-O"
            elf_check: false
          - asset: tg-ws-proxy-darwin-arm64
            goos: darwin
            goarch: arm64
            file_match: "Mach-O"
            elf_check: false
          - asset: tg-ws-proxy-freebsd-amd64
            goos: freebsd
            goarch: amd64
            file_match: "x86-64"

    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: setup go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: "1.22"
          cache: false

      - name: build target binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm || '' }}
          GOMIPS: ${{ matrix.gomips || '' }}
          OUTPUT: build/${{ matrix.asset }}
        run: |
          mkdir -p build
          go build -trimpath -ldflags="-s -w" -o "$OUTPUT" ./cmd/tg-ws-proxy

      - name: inspect target binary
        env:
          OUTPUT: build/${{ matrix.asset }}
          FILE_MATCH: ${{ matrix.file_match }}
          ELF_CHECK: ${{ matrix.elf_check || 'true' }}
        run: |
          test -s "$OUTPUT"
          file "$OUTPUT" | tee /tmp/file-output.txt
          grep -q "$FILE_MATCH" /tmp/file-output.txt
          if [ "$ELF_CHECK" != "false" ]; then
            if readelf -l "$OUTPUT" | grep -q "Requesting program interpreter"; then
              echo "dynamic loader detected in $OUTPUT"
              readelf -l "$OUTPUT"
              exit 1
            fi
          fi

      - name: upload target artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: ${{ matrix.asset }}
          path: build/${{ matrix.asset }}

  build-darwin-universal:
    needs: build-binaries
    runs-on: macos-latest

    steps:
      - name: download darwin amd64 artifact
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53
        with:
          name: tg-ws-proxy-darwin-amd64
          path: build

      - name: download darwin arm64 artifact
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53
        with:
          name: tg-ws-proxy-darwin-arm64
          path: build

      - name: create universal binary
        run: |
          lipo -create -output build/tg-ws-proxy-darwin-universal \
            build/tg-ws-proxy-darwin-amd64 build/tg-ws-proxy-darwin-arm64
          lipo -info build/tg-ws-proxy-darwin-universal

      - name: upload universal artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: tg-ws-proxy-darwin-universal
          path: build/tg-ws-proxy-darwin-universal

  verify-artifacts:
    needs: [build-binaries, build-darwin-universal]
    runs-on: ubuntu-latest

    steps:
      - name: download all artifacts
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53
        with:
          path: build

      - name: verify expected artifact names
        run: |
          test -f build/tg-ws-proxy-openwrt-mipsel_24kc/tg-ws-proxy-openwrt-mipsel_24kc
          test -f build/tg-ws-proxy-openwrt-mips_24kc/tg-ws-proxy-openwrt-mips_24kc
          test -f build/tg-ws-proxy-openwrt-x86_64/tg-ws-proxy-openwrt-x86_64
          test -f build/tg-ws-proxy-openwrt-armv7/tg-ws-proxy-openwrt-armv7
          test -f build/tg-ws-proxy-openwrt-aarch64/tg-ws-proxy-openwrt-aarch64
          test -f build/tg-ws-proxy-linux-386/tg-ws-proxy-linux-386
          test -f build/tg-ws-proxy-linux-riscv64/tg-ws-proxy-linux-riscv64
          test -f build/tg-ws-proxy-linux-armv6/tg-ws-proxy-linux-armv6
          test -f build/tg-ws-proxy-linux-loong64/tg-ws-proxy-linux-loong64
          test -f build/tg-ws-proxy-windows-amd64.exe/tg-ws-proxy-windows-amd64.exe
          test -f build/tg-ws-proxy-windows-arm64.exe/tg-ws-proxy-windows-arm64.exe
          test -f build/tg-ws-proxy-darwin-amd64/tg-ws-proxy-darwin-amd64
          test -f build/tg-ws-proxy-darwin-arm64/tg-ws-proxy-darwin-arm64
          test -f build/tg-ws-proxy-darwin-universal/tg-ws-proxy-darwin-universal
          test -f build/tg-ws-proxy-freebsd-amd64/tg-ws-proxy-freebsd-amd64

  smoke-openwrt-x86_64:
    needs: build-binaries
    runs-on: ubuntu-latest

    steps:
      - name: download x86_64 artifact
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53
        with:
          name: tg-ws-proxy-openwrt-x86_64
          path: build

      - name: smoke-run x86_64 binary
        run: |
          chmod +x build/tg-ws-proxy-openwrt-x86_64
          set +e
          timeout 3s build/tg-ws-proxy-openwrt-x86_64 -host 127.0.0.1 -port 0 -verbose > /tmp/smoke.log 2>&1
          rc=$?
          set -e
          cat /tmp/smoke.log
          if [ "$rc" -ne 124 ]; then
            echo "unexpected exit code: $rc"
            exit 1
          fi
          grep -q "listening on" /tmp/smoke.log
