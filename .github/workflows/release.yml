name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  go-tests:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: 0

    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: setup go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: "1.22"
          cache: false

      - name: run go tests
        run: make test-go

  shell-tests:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: install bats
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: run shell tests
        run: make test-shell

  build-and-release:
    needs: [go-tests, shell-tests]
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: 0

    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: setup go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: "1.22"
          cache: false

      - name: build binaries
        run: |
          mkdir -p build
          GOOS=linux GOARCH=mipsle GOMIPS=softfloat go build -trimpath -ldflags="-s -w" -o build/tg-ws-proxy-openwrt-mipsel_24kc ./cmd/tg-ws-proxy
          GOOS=linux GOARCH=mips GOMIPS=softfloat go build -trimpath -ldflags="-s -w" -o build/tg-ws-proxy-openwrt-mips_24kc ./cmd/tg-ws-proxy
          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o build/tg-ws-proxy-openwrt-x86_64 ./cmd/tg-ws-proxy
          GOOS=linux GOARCH=arm GOARM=7 go build -trimpath -ldflags="-s -w" -o build/tg-ws-proxy-openwrt-armv7 ./cmd/tg-ws-proxy
          GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o build/tg-ws-proxy-openwrt-aarch64 ./cmd/tg-ws-proxy
          GOOS=linux GOARCH=386 go build -trimpath -ldflags="-s -w" -o build/tg-ws-proxy-linux-386 ./cmd/tg-ws-proxy
          GOOS=linux GOARCH=riscv64 go build -trimpath -ldflags="-s -w" -o build/tg-ws-proxy-linux-riscv64 ./cmd/tg-ws-proxy
          GOOS=linux GOARCH=arm GOARM=6 go build -trimpath -ldflags="-s -w" -o build/tg-ws-proxy-linux-armv6 ./cmd/tg-ws-proxy
          GOOS=linux GOARCH=loong64 go build -trimpath -ldflags="-s -w" -o build/tg-ws-proxy-linux-loong64 ./cmd/tg-ws-proxy
          GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o build/tg-ws-proxy-windows-amd64.exe ./cmd/tg-ws-proxy
          GOOS=windows GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o build/tg-ws-proxy-windows-arm64.exe ./cmd/tg-ws-proxy
          GOOS=darwin GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o build/tg-ws-proxy-darwin-amd64 ./cmd/tg-ws-proxy
          GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o build/tg-ws-proxy-darwin-arm64 ./cmd/tg-ws-proxy
          GOOS=freebsd GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o build/tg-ws-proxy-freebsd-amd64 ./cmd/tg-ws-proxy
          GOOS=freebsd GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o build/tg-ws-proxy-freebsd-arm64 ./cmd/tg-ws-proxy
          cp build/tg-ws-proxy-openwrt-mipsel_24kc build/tg-ws-proxy-openwrt

      - name: build standalone manager script
        run: sh ./scripts/build-manager-standalone.sh build/tg-ws-proxy-go.sh

      - name: publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/tg-ws-proxy-openwrt-mipsel_24kc
            build/tg-ws-proxy-openwrt-mips_24kc
            build/tg-ws-proxy-openwrt-x86_64
            build/tg-ws-proxy-openwrt-armv7
            build/tg-ws-proxy-openwrt-aarch64
            build/tg-ws-proxy-linux-386
            build/tg-ws-proxy-linux-riscv64
            build/tg-ws-proxy-linux-armv6
            build/tg-ws-proxy-linux-loong64
            build/tg-ws-proxy-windows-amd64.exe
            build/tg-ws-proxy-windows-arm64.exe
            build/tg-ws-proxy-darwin-amd64
            build/tg-ws-proxy-darwin-arm64
            build/tg-ws-proxy-freebsd-amd64
            build/tg-ws-proxy-freebsd-arm64
            build/tg-ws-proxy-openwrt
            build/tg-ws-proxy-go.sh

  upload-darwin-universal:
    needs: build-and-release
    runs-on: macos-latest
    env:
      CGO_ENABLED: 0

    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: setup go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: "1.22"
          cache: false

      - name: build universal darwin binary
        run: |
          mkdir -p build
          GOOS=darwin GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o build/tg-ws-proxy-darwin-amd64 ./cmd/tg-ws-proxy
          GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o build/tg-ws-proxy-darwin-arm64 ./cmd/tg-ws-proxy
          lipo -create -output build/tg-ws-proxy-darwin-universal \
            build/tg-ws-proxy-darwin-amd64 build/tg-ws-proxy-darwin-arm64
          lipo -info build/tg-ws-proxy-darwin-universal

      - name: upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" build/tg-ws-proxy-darwin-universal --clobber
